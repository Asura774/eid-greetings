<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak Greeting Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { 
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden;
        }
        .card-container {
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .is-open .card-container {
            transform: rotateY(180deg) scale(1.05);
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: twinkle 3s infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float-anim { animation: float 4s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4 overflow-hidden relative">

    <div id="star-container" class="absolute inset-0 overflow-hidden pointer-events-none"></div>

    <div class="max-w-md w-full relative z-10 perspective-1000" id="main-wrapper">
        <div id="card" class="relative w-full aspect-[4/5] preserve-3d card-container cursor-pointer">
            
            <!-- FRONT -->
            <div class="absolute inset-0 w-full h-full backface-hidden rounded-2xl shadow-2xl overflow-hidden flex flex-col items-center justify-between py-12 px-6 border border-indigo-900/50"
                 style="background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);">
                <div class="flex w-full justify-between opacity-60">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" class="animate-pulse"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" class="animate-pulse delay-75"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                </div>
                <div class="flex flex-col items-center space-y-6 float-anim">
                    <div class="relative">
                        <svg width="120" height="120" viewBox="0 0 100 100" class="drop-shadow-[0_0_15px_rgba(251,191,36,0.5)]">
                            <path d="M 50 10 A 40 40 0 1 0 90 50 A 30 30 0 1 1 50 10 Z" fill="url(#gold-grad)" />
                            <defs>
                                <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#fef08a" />
                                    <stop offset="50%" stop-color="#f59e0b" />
                                    <stop offset="100%" stop-color="#b45309" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div class="text-center">
                        <h1 class="text-5xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-400 to-amber-600 serif mb-2">EID</h1>
                        <h2 class="text-3xl font-light tracking-[0.3em] text-amber-500 serif">MUBARAK</h2>
                    </div>
                </div>
                <div class="text-center space-y-2 opacity-80">
                    <p class="text-indigo-200 text-xs uppercase tracking-[0.4em] animate-bounce">Tap to Open</p>
                    <svg class="w-6 h-6 text-indigo-300 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                </div>
            </div>

            <!-- INSIDE -->
            <div class="absolute inset-0 w-full h-full backface-hidden rounded-2xl shadow-2xl overflow-hidden flex flex-col p-1"
                 style="background: linear-gradient(135deg, #fefce8 0%, #fef3c7 100%); transform: rotateY(180deg);">
                <div class="w-full h-full border-2 border-amber-300 rounded-xl p-8 flex flex-col justify-between relative bg-white/40 backdrop-blur-sm">
                    <div class="text-center">
                        <h3 class="text-xl font-bold text-amber-800 serif uppercase tracking-widest">Eid al-Fitr</h3>
                        <div class="h-px w-16 bg-amber-300 mx-auto mt-2"></div>
                    </div>
                    <div class="flex-1 flex flex-col justify-center space-y-6 text-center">
                        <div>
                            <p class="text-[10px] text-amber-600/70 uppercase tracking-widest font-bold mb-1">To</p>
                            <input type="text" placeholder="Recipient Name" class="bg-transparent border-b border-dashed border-amber-400 text-2xl text-slate-800 focus:outline-none text-center w-full serif placeholder-amber-200" onclick="event.stopPropagation()">
                        </div>
                        <p class="text-slate-700 leading-relaxed text-sm italic">"May the blessings of Allah fill your life with happiness and open all the doors of success now and always."</p>
                        <div>
                            <p class="text-[10px] text-amber-600/70 uppercase tracking-widest font-bold mb-1">From</p>
                            <input type="text" placeholder="Your Name" class="bg-transparent border-b border-dashed border-amber-400 text-xl text-slate-800 focus:outline-none text-center w-full serif placeholder-amber-200" onclick="event.stopPropagation()">
                        </div>
                    </div>
                    <button id="close-btn" class="mx-auto px-6 py-1.5 rounded-full bg-amber-200/50 hover:bg-amber-300/50 text-amber-900 text-[10px] font-bold uppercase tracking-widest transition-all border border-amber-300">Close Card</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('star-container');
        for (let i = 0; i < 40; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.animationDelay = `${Math.random() * 3}s`;
            container.appendChild(star);
        }
        const wrapper = document.getElementById('main-wrapper');
        const card = document.getElementById('card');
        const closeBtn = document.getElementById('close-btn');
        card.addEventListener('click', () => wrapper.classList.add('is-open'));
        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            wrapper.classList.remove('is-open');
        });
    </script>
</body>
</html>
